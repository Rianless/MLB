<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <link rel="icon" type="image/png" href="/mlb.png">
  <link rel="apple-touch-icon" href="/mlb.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MLB ⚾">
  <meta name="theme-color" content="#E8ECF1">
  <title>MLB 대시보드 ⚾</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#E8ECF1;color:#0A0E1A;font-family:"Inter","Noto Sans KR",sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes slideDown{from{transform:translateY(0);opacity:1}to{transform:translateY(100%);opacity:0}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    button{cursor:pointer;-webkit-appearance:none;border:none;outline:none;}
    ::-webkit-scrollbar{display:none;}
    input{outline:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const TEAMS = {
  "Arizona Diamondbacks": {short:"ARI", emoji:"🐍", color:"#A71930", league:"NL"},
  "Atlanta Braves":        {short:"ATL", emoji:"🪓", color:"#CE1141", league:"NL"},
  "Baltimore Orioles":     {short:"BAL", emoji:"🐦", color:"#DF4601", league:"AL"},
  "Boston Red Sox":        {short:"BOS", emoji:"🔴", color:"#BD3039", league:"AL"},
  "Chicago Cubs":          {short:"CHC", emoji:"🐻", color:"#0E3386", league:"NL"},
  "Chicago White Sox":     {short:"CWS", emoji:"⚫", color:"#27251F", league:"AL"},
  "Cincinnati Reds":       {short:"CIN", emoji:"🔴", color:"#C6011F", league:"NL"},
  "Cleveland Guardians":   {short:"CLE", emoji:"🔵", color:"#E31937", league:"AL"},
  "Colorado Rockies":      {short:"COL", emoji:"💜", color:"#333366", league:"NL"},
  "Detroit Tigers":        {short:"DET", emoji:"🐯", color:"#0C2340", league:"AL"},
  "Houston Astros":        {short:"HOU", emoji:"⭐", color:"#002D62", league:"AL"},
  "Kansas City Royals":    {short:"KC",  emoji:"💙", color:"#004687", league:"AL"},
  "Los Angeles Angels":    {short:"LAA", emoji:"👼", color:"#BA0021", league:"AL"},
  "Los Angeles Dodgers":   {short:"LAD", emoji:"💙", color:"#005A9C", league:"NL"},
  "Miami Marlins":         {short:"MIA", emoji:"🐟", color:"#00A3E0", league:"NL"},
  "Milwaukee Brewers":     {short:"MIL", emoji:"🍺", color:"#FFC52F", league:"NL"},
  "Minnesota Twins":       {short:"MIN", emoji:"🔴", color:"#002B5C", league:"AL"},
  "New York Mets":         {short:"NYM", emoji:"🔵", color:"#002D72", league:"NL"},
  "New York Yankees":      {short:"NYY", emoji:"⚾", color:"#003087", league:"AL"},
  "Oakland Athletics":     {short:"OAK", emoji:"🐘", color:"#003831", league:"AL"},
  "Philadelphia Phillies": {short:"PHI", emoji:"🔔", color:"#E81828", league:"NL"},
  "Pittsburgh Pirates":    {short:"PIT", emoji:"☠️", color:"#FDB827", league:"NL"},
  "San Diego Padres":      {short:"SD",  emoji:"🤎", color:"#2F241D", league:"NL"},
  "San Francisco Giants":  {short:"SF",  emoji:"🟠", color:"#FD5A1E", league:"NL"},
  "Seattle Mariners":      {short:"SEA", emoji:"🧭", color:"#0C2C56", league:"AL"},
  "St. Louis Cardinals":   {short:"STL", emoji:"🐦", color:"#C41E3A", league:"NL"},
  "Tampa Bay Rays":        {short:"TB",  emoji:"💛", color:"#092C5C", league:"AL"},
  "Texas Rangers":         {short:"TEX", emoji:"🤠", color:"#003278", league:"AL"},
  "Toronto Blue Jays":     {short:"TOR", emoji:"🐦", color:"#134A8E", league:"AL"},
  "Washington Nationals":  {short:"WSH", emoji:"🦅", color:"#AB0003", league:"NL"},
};

function getTeam(name) {
  return TEAMS[name] || {short: name?.split(" ").pop() || "?", emoji:"⚾", color:"#888", league:"?"};
}

function ScoreCard({game, dark, D, onClick}) {
  const away = getTeam(game.away.name);
  const home = getTeam(game.home.name);
  const isLive = game.status === "In Progress";
  const isFinal = game.status === "Final" || game.status === "Game Over";
  const isScheduled = !isLive && !isFinal;
  const gameTime = new Date(game.startTime).toLocaleTimeString("ko-KR", {
    hour:"2-digit", minute:"2-digit", timeZone:"Asia/Seoul"
  });

  const isFinalCard = game.status === "Final" || game.status === "Game Over";
  return (
    <div onClick={onClick} style={{
      background:isFinalCard?(dark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.04)"):D.card,
      border:`1px solid ${isFinalCard?(dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.06)"):D.cardBorder}`,
      borderRadius:"16px", padding:"14px 16px", marginBottom:"10px",
      animation:"fadeIn 0.3s", cursor:"pointer",
      opacity:isFinalCard?0.75:1,
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <span style={{fontSize:"11px",fontWeight:"700",color:"#FFB300",fontFamily:"'Noto Sans KR',sans-serif"}}>
            {isScheduled?`${gameTime} KST`:isLive?"LIVE":"종료"}
          </span>
          {isLive && <span style={{fontSize:"9px",background:"#2d3748",color:"#fff",borderRadius:"4px",padding:"1px 6px",fontWeight:"800"}}>● {game.inningHalf==="Top"?"▲":"▼"}{game.inning}회</span>}
          {isFinalCard && <span style={{fontSize:"9px",background:"rgba(255,255,255,0.08)",color:D.textSub,borderRadius:"4px",padding:"1px 6px",fontWeight:"700",fontFamily:"'Noto Sans KR',sans-serif"}}>FINAL</span>}
          <span style={{fontSize:"9px",fontWeight:"700",color:"#2d3748",background:"rgba(45,55,72,0.12)",borderRadius:"4px",padding:"1px 5px"}}>{away.league}</span>
        </div>
        <span style={{fontSize:"10px",color:D.textSub,fontFamily:"'Noto Sans KR',sans-serif"}}>📍{game.venue} ›</span>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1}}>
          <span style={{fontSize:"28px"}}>{away.emoji}</span>
          <div>
            <div style={{fontSize:"13px",fontWeight:"800",color:D.text,fontFamily:"'Noto Sans KR',sans-serif"}}>{away.short}</div>
            <div style={{fontSize:"9px",color:D.textSub}}>{game.away.record}</div>
          </div>
        </div>
        <div style={{textAlign:"center",padding:"0 12px"}}>
          {isScheduled
            ? <span style={{fontSize:"18px",fontWeight:"900",color:D.textSub}}>VS</span>
            : <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"30px",fontWeight:"900",color:D.text,opacity:isFinal&&game.away.score>game.home.score?1:0.6}}>{game.away.score}</span>
                <span style={{fontSize:"14px",color:D.textSub}}>:</span>
                <span style={{fontSize:"30px",fontWeight:"900",color:D.text,opacity:isFinal&&game.home.score>game.away.score?1:0.6}}>{game.home.score}</span>
              </div>
          }
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1,flexDirection:"row-reverse"}}>
          <span style={{fontSize:"28px"}}>{home.emoji}</span>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"13px",fontWeight:"800",color:D.text,fontFamily:"'Noto Sans KR',sans-serif"}}>{home.short}</div>
            <div style={{fontSize:"9px",color:D.textSub}}>{game.home.record}</div>
          </div>
        </div>
      </div>
      {/* 종료 경기 승패 투수 */}
      {isFinalCard && (game.winner || game.loser) && (
        <div style={{display:"flex",gap:"12px",marginTop:"10px",paddingTop:"10px",borderTop:`1px solid ${dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)"}`}}>
          {game.winner && (
            <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
              <span style={{fontSize:"10px",background:"rgba(0,200,100,0.15)",color:"#00C864",borderRadius:"4px",padding:"1px 5px",fontWeight:"700"}}>승</span>
              <span style={{fontSize:"11px",color:D.text,fontWeight:"600"}}>{game.winner}</span>
            </div>
          )}
          {game.loser && (
            <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
              <span style={{fontSize:"10px",background:"rgba(255,50,50,0.15)",color:"#FF4444",borderRadius:"4px",padding:"1px 5px",fontWeight:"700"}}>패</span>
              <span style={{fontSize:"11px",color:D.text,fontWeight:"600"}}>{game.loser}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


const PC = {CF:{x:50,y:8},LF:{x:18,y:20},RF:{x:82,y:20},SS:{x:34,y:44},"2B":{x:64,y:44},P:{x:50,y:54},"3B":{x:18,y:62},"1B":{x:82,y:62},C:{x:50,y:80},DH:{x:10,y:80}};

function Diamond({players, color, dark}) {
  return (
    <div style={{position:"relative",width:"100%",paddingBottom:"88%"}}>
      <svg viewBox="0 0 340 300" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
        <path d="M170 260 L30 90 Q170 -20 310 90 Z" fill="rgba(255,255,255,0.03)" stroke={dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)"} strokeWidth="1"/>
        <polygon points="170,75 240,150 170,225 100,150" fill="rgba(255,255,255,0.03)" stroke={dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.25)"} strokeWidth="1.5"/>
        {[[170,75],[240,150],[170,225],[100,150]].map(([x,y],i)=>(
          <rect key={i} x={x-6} y={y-6} width="12" height="12" rx="2"
            fill={i===3?(dark?"rgba(255,255,255,0.9)":"rgba(0,0,0,0.7)"):(dark?"rgba(255,255,255,0.7)":"rgba(0,0,0,0.5)")}
            transform={`rotate(45,${x},${y})`}/>
        ))}
        <circle cx="170" cy="155" r="6" fill="rgba(180,120,60,0.4)" stroke="rgba(180,120,60,0.5)" strokeWidth="1"/>
        <line x1="170" y1="225" x2="30" y2="90" stroke={dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.1)"} strokeWidth="1" strokeDasharray="4,4"/>
        <line x1="170" y1="225" x2="310" y2="90" stroke={dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.1)"} strokeWidth="1" strokeDasharray="4,4"/>
      </svg>
      {players.map((p,idx)=>{
        const pos=PC[p.p]||PC.DH; const isP=p.p==="P";
        return (
          <div key={idx} style={{position:"absolute",left:`${pos.x}%`,top:`${pos.y}%`,transform:"translate(-50%,-50%)",zIndex:2}}>
            <div style={{background:isP?`linear-gradient(135deg,${color},${color}bb)`:"rgba(12,18,32,0.93)",
              border:`1.5px solid ${isP?color:"rgba(255,255,255,0.18)"}`,borderRadius:"8px",padding:"3px 7px",
              display:"flex",alignItems:"center",gap:"4px",whiteSpace:"nowrap",
              boxShadow:isP?`0 0 10px ${color}55,0 2px 6px rgba(0,0,0,0.5)`:"0 2px 6px rgba(0,0,0,0.5)"}}>
              <span style={{fontSize:"9px",fontWeight:"900",color:isP?"#fff":color,minWidth:"12px",textAlign:"center"}}>{p.n}</span>
              <span style={{fontSize:"11px",fontWeight:"700",color:"#fff",fontFamily:"'Noto Sans KR',sans-serif"}}>{p.name.split(" ").pop()}</span>
              <span style={{fontSize:"9px",color:"rgba(255,255,255,0.4)"}}>{p.p}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function GameModal({game, dark, D, onClose}) {
  const [closing, setClosing] = useState(false);
  const [lineupTab, setLineupTab] = useState("away");
  const away = getTeam(game.away.name);
  const home = getTeam(game.home.name);

  // 라인업에 투수 추가
  const addPitcher = (players, pitcher) => {
    if(!pitcher) return players;
    const hasPitcher = players.some(p => p.p === "P");
    if(hasPitcher) return players;
    return [...players, {n:"P", name:pitcher, p:"P"}];
  };
  const awayLineup = game.lineup ? addPitcher(game.lineup.away||[], game.away.pitcher) : null;
  const homeLineup = game.lineup ? addPitcher(game.lineup.home||[], game.home.pitcher) : null;
  const curLineup = lineupTab==="away" ? (awayLineup||[]) : (homeLineup||[]);
  const isLive = game.status === "In Progress";
  const isFinal = game.status === "Final" || game.status === "Game Over";
  const isScheduled = !isLive && !isFinal;
  const gameTime = new Date(game.startTime).toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit",timeZone:"Asia/Seoul"});
  const gameDate = new Date(game.startTime).toLocaleDateString("ko-KR", {month:"long",day:"numeric",weekday:"short",timeZone:"Asia/Seoul"});
  const handleClose = () => { setClosing(true); setTimeout(onClose, 280); };
  const as = game.awayInnings || Array(9).fill(null);
  const hs = game.homeInnings || Array(9).fill(null);
  const at = (game.awayInnings||[]).reduce((a,b)=>a+(b??0),0);
  const ht = (game.homeInnings||[]).reduce((a,b)=>a+(b??0),0);

  return (
    <div style={{position:"fixed",inset:0,zIndex:100,background:dark?"rgba(0,0,0,0.8)":"rgba(0,0,0,0.4)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn 0.2s"}} onClick={handleClose}>
      <div style={{width:"100%",maxWidth:"520px",background:dark?"#0F1525":"#ffffff",border:`1px solid ${dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)"}`,borderRadius:"22px 22px 0 0",maxHeight:"92vh",overflowY:"auto",animation:closing?"slideDown 0.28s ease forwards":"slideUp 0.3s ease",paddingBottom:"28px"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 2px"}}>
          <div style={{width:"34px",height:"4px",borderRadius:"2px",background:dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.15)"}}/>
        </div>
        <div style={{padding:"10px 18px 14px",borderBottom:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.08)"}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div>
              <span style={{fontSize:"11px",fontWeight:"700",color:"#FFB300"}}>{gameDate} · {gameTime} KST</span>
              <div style={{fontSize:"10px",color:D.textSub,marginTop:"2px"}}>📍 {game.venue}</div>
            </div>
            <button onClick={handleClose} style={{background:dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.06)",color:dark?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.5)",borderRadius:"50%",width:"28px",height:"28px",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1}}>
              <span style={{fontSize:"40px"}}>{away.emoji}</span>
              <div>
                <div style={{fontSize:"16px",fontWeight:"900",color:D.text}}>{away.short}</div>
                <div style={{fontSize:"11px",color:D.textSub}}>{game.away.name}</div>
                <div style={{fontSize:"10px",color:D.textSub}}>{game.away.record}</div>
              </div>
            </div>
            <div style={{textAlign:"center",padding:"0 10px"}}>
              {isScheduled
                ? <div style={{fontSize:"20px",fontWeight:"800",color:"#FFB300"}}>VS</div>
                : <div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <span style={{fontSize:"32px",fontWeight:"900",color:D.text}}>{game.away.score}</span>
                      <span style={{color:D.textSub}}>:</span>
                      <span style={{fontSize:"32px",fontWeight:"900",color:D.text}}>{game.home.score}</span>
                    </div>
                    {isLive && <div style={{fontSize:"11px",color:"#FFB300",fontWeight:"700",textAlign:"center"}}>{game.inningHalf==="Top"?"▲":"▼"}{game.inning}회</div>}
                    {isFinal && <div style={{fontSize:"10px",color:D.textSub,textAlign:"center"}}>FINAL</div>}
                  </div>
              }
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1,flexDirection:"row-reverse"}}>
              <span style={{fontSize:"40px"}}>{home.emoji}</span>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:"16px",fontWeight:"900",color:D.text}}>{home.short}</div>
                <div style={{fontSize:"11px",color:D.textSub}}>{game.home.name}</div>
                <div style={{fontSize:"10px",color:D.textSub}}>{game.home.record}</div>
              </div>
            </div>
          </div>
        </div>
        <div style={{padding:"18px 18px 0"}}>
          <div style={{marginBottom:"18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
              <span style={{fontSize:"15px"}}>📊</span>
              <span style={{fontSize:"13px",fontWeight:"800"}}>이닝별 스코어</span>
            </div>
            <div style={{background:dark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)",border:`1px solid ${dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.08)"}`,borderRadius:"12px",padding:"4px"}}>
              {isScheduled
                ? <div style={{textAlign:"center",padding:"16px",color:D.textSub,fontSize:"12px"}}>경기 예정 · 경기 후 스코어가 표시됩니다</div>
                : <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",minWidth:"320px"}}>
                      <thead>
                        <tr>
                          <td style={{padding:"6px",color:D.textSub,width:"55px"}}></td>
                          {[1,2,3,4,5,6,7,8,9].map(i=><td key={i} style={{textAlign:"center",padding:"6px 3px",color:D.textSub,fontWeight:"700"}}>{i}</td>)}
                          <td style={{textAlign:"center",padding:"6px 5px",color:D.text,fontWeight:"900",fontSize:"13px"}}>R</td>
                        </tr>
                      </thead>
                      <tbody>
                        {[[game.away.name,as,at,away.color],[game.home.name,hs,ht,home.color]].map(([nm,sc,tot,cl],ri)=>(
                          <tr key={ri}>
                            <td style={{padding:"8px 6px",fontSize:"11px",fontWeight:"700",color:D.textSub,borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`}}>
                              <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                                <div style={{width:"5px",height:"5px",borderRadius:"50%",background:cl}}/>
                                {getTeam(nm).short}
                              </div>
                            </td>
                            {sc.map((s,i)=>(
                              <td key={i} style={{textAlign:"center",padding:"8px 3px",color:s>0?D.text:D.textMuted,fontWeight:s>0?"700":"400",borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`}}>
                                {s===null?<span style={{color:D.textMuted}}>-</span>:s}
                              </td>
                            ))}
                            <td style={{textAlign:"center",padding:"8px 5px",fontWeight:"900",fontSize:"14px",color:tot===Math.max(at,ht)&&at!==ht?cl:D.text,borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`}}>{tot}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
              }
            </div>
          </div>
          {/* 투수 섹션 - 종료경기면 승패투수, 아니면 선발투수 */}
          {(game.status==="Final"||game.status==="Game Over")
            ? (game.winner||game.loser) && (
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
                    <span style={{fontSize:"15px"}}>⚾</span>
                    <span style={{fontSize:"13px",fontWeight:"800",fontFamily:"'Noto Sans KR',sans-serif"}}>투수</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    {game.winner && (
                      <div style={{background:dark?"rgba(0,200,100,0.08)":"rgba(0,200,100,0.06)",border:"1px solid rgba(0,200,100,0.2)",borderRadius:"12px",padding:"12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"5px"}}>
                          <span style={{fontSize:"9px",background:"rgba(0,200,100,0.2)",color:"#00C864",borderRadius:"4px",padding:"1px 6px",fontWeight:"800"}}>승</span>
                          <span style={{fontSize:"10px",color:"#00C864",fontWeight:"700"}}>승리투수</span>
                        </div>
                        <div style={{fontSize:"14px",fontWeight:"800",color:D.text}}>{game.winner}</div>
                      </div>
                    )}
                    {game.loser && (
                      <div style={{background:dark?"rgba(255,50,50,0.08)":"rgba(255,50,50,0.06)",border:"1px solid rgba(255,50,50,0.2)",borderRadius:"12px",padding:"12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"5px"}}>
                          <span style={{fontSize:"9px",background:"rgba(255,50,50,0.2)",color:"#FF4444",borderRadius:"4px",padding:"1px 6px",fontWeight:"800"}}>패</span>
                          <span style={{fontSize:"10px",color:"#FF4444",fontWeight:"700"}}>패전투수</span>
                        </div>
                        <div style={{fontSize:"14px",fontWeight:"800",color:D.text}}>{game.loser}</div>
                      </div>
                    )}
                  </div>
                </div>
              )
            : (game.away.pitcher || game.home.pitcher) && (
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
                    <span style={{fontSize:"15px"}}>⚾</span>
                    <span style={{fontSize:"13px",fontWeight:"800",fontFamily:"'Noto Sans KR',sans-serif"}}>선발 투수</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    {[{t:game.away,info:away},{t:game.home,info:home}].map(({t,info},i)=>(
                      <div key={i} style={{background:dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)",border:`1px solid ${dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.08)"}`,borderRadius:"12px",padding:"12px"}}>
                        <div style={{fontSize:"10px",color:D.textSub,marginBottom:"4px"}}>{i===0?"원정":"홈"} · {info.short}</div>
                        <div style={{fontSize:"14px",fontWeight:"800",color:D.text}}>{t.pitcher || "미정"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )
          }

          {/* 선발 라인업 */}
          <div style={{marginTop:"18px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <span style={{fontSize:"15px"}}>🧢</span>
                <span style={{fontSize:"13px",fontWeight:"800",fontFamily:"'Noto Sans KR',sans-serif"}}>선발 라인업</span>
              </div>
              {game.lineup && (
                <div style={{display:"flex",gap:"4px"}}>
                  {[{id:"away",label:away.short,color:away.color},{id:"home",label:home.short,color:home.color}].map(({id,label,color})=>(
                    <button key={id} onClick={()=>setLineupTab(id)} style={{
                      padding:"4px 10px",
                      background:lineupTab===id?color:dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)",
                      border:"none",borderRadius:"8px",color:"#fff",fontSize:"11px",fontWeight:"700",
                      transition:"all 0.2s"}}>
                      {label}
                    </button>
                  ))}
                </div>
              )}
            </div>
            {!game.lineup
              ? <div style={{background:dark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)",border:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`,borderRadius:"14px",padding:"20px",textAlign:"center"}}>
                  {(lineupTab==="away"?game.away.pitcher:game.home.pitcher)
                    ? <div>
                        <div style={{fontSize:"12px",color:D.textSub,fontFamily:"'Noto Sans KR',sans-serif",marginBottom:"12px"}}>선발 투수</div>
                        <Diamond players={[{n:"P",name:lineupTab==="away"?game.away.pitcher:game.home.pitcher,p:"P"}]} color={lineupTab==="away"?away.color:home.color} dark={dark}/>
                      </div>
                    : <div>
                        <div style={{fontSize:"24px",marginBottom:"6px"}}>📋</div>
                        <div style={{fontSize:"13px",color:D.textSub,fontFamily:"'Noto Sans KR',sans-serif"}}>라인업은 경기 시작 전 공개됩니다</div>
                      </div>
                  }
                </div>
              : <div style={{background:dark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.02)",border:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`,borderRadius:"14px",padding:"12px 10px"}}>
                  <div style={{textAlign:"center",marginBottom:"4px",fontSize:"12px",fontWeight:"700",color:lineupTab==="away"?away.color:home.color}}>
                    {lineupTab==="away"?away.emoji:home.emoji} {lineupTab==="away"?game.away.name:game.home.name}
                  </div>
                  <Diamond players={curLineup} color={lineupTab==="away"?away.color:home.color} dark={dark}/>
                  <div style={{marginTop:"10px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
                    {curLineup.map((p,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:"6px",padding:"5px 7px",borderRadius:"7px",background:dark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)",border:`1px solid ${dark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.05)"}`}}>
                        <span style={{fontSize:"10px",fontWeight:"900",minWidth:"17px",textAlign:"center",
                          color:p.p==="P"?"#fff":(lineupTab==="away"?away.color:home.color),
                          background:p.p==="P"?(lineupTab==="away"?away.color+"cc":home.color+"cc"):"transparent",
                          borderRadius:"3px",padding:p.p==="P"?"1px 3px":"0"}}>{p.n}</span>
                        <span style={{fontSize:"12px",fontWeight:"700",color:dark?"#fff":D.text,fontFamily:"'Noto Sans KR',sans-serif",flex:1}}>{p.name.split(" ").pop()}</span>
                        <span style={{fontSize:"10px",color:D.textSub}}>{p.p}</span>
                      </div>
                    ))}
                  </div>
                </div>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function TodayTab({dark, D}) {
  const [games, setGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [selGame, setSelGame] = useState(null);
  const [leagueFilter, setLeagueFilter] = useState("ALL");
  const [search, setSearch] = useState("");

  const fetchGames = async () => {
    try {
      const r = await fetch("/api/mlbScores");
      const data = await r.json();
      if(data.error) throw new Error(data.error);
      setGames(data.games || []);
      setLastUpdate(new Date());
      setError(null);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  useEffect(()=>{
    fetchGames();
    const interval = setInterval(fetchGames, 30000);
    return ()=>clearInterval(interval);
  },[]);

  // 필터링
  const filterGames = (list) => {
    return list.filter(g => {
      const awayLeague = getTeam(g.away.name).league;
      const homeLeague = getTeam(g.home.name).league;
      const leagueOk = leagueFilter === "ALL" || (awayLeague === leagueFilter && homeLeague === leagueFilter);
      const searchLower = search.toLowerCase();
      const searchOk = !search ||
        g.away.name.toLowerCase().includes(searchLower) ||
        g.home.name.toLowerCase().includes(searchLower) ||
        getTeam(g.away.name).short.toLowerCase().includes(searchLower) ||
        getTeam(g.home.name).short.toLowerCase().includes(searchLower);
      return leagueOk && searchOk;
    });
  };

  const liveGames      = filterGames(games.filter(g=>g.status==="In Progress"));
  const finalGames     = filterGames(games.filter(g=>g.status==="Final"||g.status==="Game Over"));
  const scheduledGames = filterGames(games.filter(g=>g.status!=="In Progress"&&g.status!=="Final"&&g.status!=="Game Over"));
  const totalFiltered  = liveGames.length + finalGames.length + scheduledGames.length;

  return (
    <div style={{animation:"fadeIn 0.4s"}}>
      {selGame && <GameModal game={selGame} dark={dark} D={D} onClose={()=>setSelGame(null)}/>}

      {/* 상단 컨트롤 */}
      <div style={{marginBottom:"14px"}}>
        {/* AL/NL 필터 + 새로고침 */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <div style={{display:"flex",gap:"6px"}}>
            {["ALL","AL","NL"].map(l=>(
              <button key={l} onClick={()=>setLeagueFilter(l)} style={{
                padding:"5px 14px",
                background:leagueFilter===l?"#2d3748":"transparent",
                border:`1px solid ${leagueFilter===l?"#2d3748":D.cardBorder}`,
                color:leagueFilter===l?"#fff":D.text,
                borderRadius:"20px",fontSize:"12px",fontWeight:"700",
                fontFamily:"'Noto Sans KR',sans-serif",
                transition:"all 0.2s"
              }}>{l}</button>
            ))}
          </div>
          <button onClick={fetchGames} style={{background:"#2d3748",color:"#fff",borderRadius:"8px",padding:"5px 12px",fontSize:"11px",fontWeight:"700"}}>새로고침</button>
        </div>

        {/* 검색창 */}
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",fontSize:"14px",color:D.textSub}}>🔍</span>
          <input
            type="text"
            placeholder="팀명 검색 (예: Yankees, LAD...)"
            value={search}
            onChange={e=>setSearch(e.target.value)}
            style={{
              width:"100%",padding:"9px 12px 9px 32px",
              background:D.card,border:`1px solid ${D.cardBorder}`,
              borderRadius:"10px",fontSize:"13px",color:D.text,
              fontFamily:"Inter, Noto Sans KR, sans-serif",
            }}
          />
          {search && (
            <button onClick={()=>setSearch("")} style={{position:"absolute",right:"10px",top:"50%",transform:"translateY(-50%)",background:"none",color:D.textSub,fontSize:"16px",padding:"0"}}>✕</button>
          )}
        </div>

        {/* 업데이트 시간 */}
        <div style={{fontSize:"10px",color:D.textSub,marginTop:"6px"}}>
          {loading?"불러오는 중...":lastUpdate?`${lastUpdate.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})} 업데이트 · ${totalFiltered}경기`:""}
        </div>
      </div>

      {loading && (
        <div style={{textAlign:"center",padding:"60px 0",color:D.textSub}}>
          <div style={{fontSize:"36px",display:"inline-block",animation:"spin 1s linear infinite"}}>⚾</div>
          <div style={{marginTop:"12px",fontSize:"13px"}}>경기 정보 불러오는 중...</div>
        </div>
      )}

      {error && (
        <div style={{background:"rgba(45,55,72,0.1)",border:"1px solid rgba(45,55,72,0.3)",borderRadius:"12px",padding:"16px",textAlign:"center",color:"#2d3748"}}>
          ❌ {error}<br/>
          <button onClick={fetchGames} style={{marginTop:"8px",background:"#2d3748",color:"#fff",borderRadius:"6px",padding:"4px 12px"}}>다시 시도</button>
        </div>
      )}

      {!loading && !error && totalFiltered===0 && (
        <div style={{textAlign:"center",padding:"60px 0",color:D.textSub}}>
          {search ? `"${search}" 검색 결과가 없어요 😴` : "오늘 예정된 경기가 없어요 😴"}
        </div>
      )}

      {liveGames.length>0 && (
        <div style={{marginBottom:"20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}><h2 style={{fontSize:"12px",fontWeight:"700",color:"#2d3748",letterSpacing:"0.1em",fontFamily:"'Noto Sans KR',sans-serif"}}>● LIVE</h2><span style={{fontSize:"10px",background:"rgba(45,55,72,0.15)",border:"1px solid rgba(45,55,72,0.3)",color:"#2d3748",borderRadius:"5px",padding:"1px 6px",fontWeight:"700"}}>{liveGames.length}경기</span></div>
          {liveGames.map(g=><ScoreCard key={g.id} game={g} dark={dark} D={D} onClick={()=>setSelGame(g)}/>)}
        </div>
      )}
      {scheduledGames.length>0 && (
        <div style={{marginBottom:"20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}><h2 style={{fontSize:"12px",fontWeight:"700",color:D.textSub,letterSpacing:"0.1em",fontFamily:"'Noto Sans KR',sans-serif"}}>예정</h2><span style={{fontSize:"10px",background:dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)",borderRadius:"5px",padding:"1px 6px",color:D.textSub,fontWeight:"700"}}>{scheduledGames.length}경기</span></div>
          {scheduledGames.map(g=><ScoreCard key={g.id} game={g} dark={dark} D={D} onClick={()=>setSelGame(g)}/>)}
        </div>
      )}
      {finalGames.length>0 && (
        <div style={{marginBottom:"20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}><h2 style={{fontSize:"12px",fontWeight:"700",color:D.textMuted,letterSpacing:"0.1em",fontFamily:"'Noto Sans KR',sans-serif"}}>종료</h2><span style={{fontSize:"10px",background:dark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.04)",borderRadius:"5px",padding:"1px 6px",color:D.textMuted,fontWeight:"700"}}>{finalGames.length}경기</span></div>
          {finalGames.map(g=><ScoreCard key={g.id} game={g} dark={dark} D={D} onClick={()=>setSelGame(g)}/>)}
        </div>
      )}
    </div>
  );
}

function StandingsTab({dark, D}) {
  const [standings, setStandings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [league, setLeague] = useState("AL");
  const [search, setSearch] = useState("");

  useEffect(()=>{
    fetch("/api/mlbStandings")
      .then(r=>r.json())
      .then(data=>{ if(data.error) throw new Error(data.error); setStandings(data.standings||[]); })
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(false));
  },[]);

  const filtered = standings
    .filter(t=>t.league===league)
    .filter(t=>!search || t.name.toLowerCase().includes(search.toLowerCase()) || getTeam(t.name).short.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{animation:"fadeIn 0.4s"}}>
      {/* AL/NL 필터 */}
      <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
        {["AL","NL"].map(l=>(
          <button key={l} onClick={()=>setLeague(l)} style={{
            padding:"6px 20px",background:league===l?"#2d3748":"transparent",
            border:`1px solid ${league===l?"#2d3748":D.cardBorder}`,
            color:league===l?"#fff":D.text,borderRadius:"20px",fontSize:"13px",fontWeight:"700"}}>
            {l}
          </button>
        ))}
      </div>

      {/* 검색창 */}
      <div style={{position:"relative",marginBottom:"12px"}}>
        <span style={{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",fontSize:"14px",color:D.textSub}}>🔍</span>
        <input
          type="text"
          placeholder="팀명 검색..."
          value={search}
          onChange={e=>setSearch(e.target.value)}
          style={{width:"100%",padding:"9px 12px 9px 32px",background:D.card,border:`1px solid ${D.cardBorder}`,borderRadius:"10px",fontSize:"13px",color:D.text,fontFamily:"Inter, Noto Sans KR, sans-serif"}}
        />
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:"10px",top:"50%",transform:"translateY(-50%)",background:"none",color:D.textSub,fontSize:"16px",padding:"0"}}>✕</button>}
      </div>

      {loading && <div style={{textAlign:"center",padding:"40px",color:D.textSub}}>로딩 중...</div>}
      {error && <div style={{color:"#2d3748",textAlign:"center",padding:"20px"}}>❌ {error}</div>}

      {!loading && !error && (
        <div style={{background:D.inputBg,border:`1px solid ${D.cardBorder}`,borderRadius:"14px",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 40px 40px 40px 50px",padding:"9px 12px",borderBottom:`1px solid ${D.cardBorder}`,fontSize:"9px",fontWeight:"700",letterSpacing:"0.1em",color:D.textSub,textTransform:"uppercase"}}>
            <span>#</span><span>팀</span>
            <span style={{textAlign:"center"}}>W</span>
            <span style={{textAlign:"center"}}>L</span>
            <span style={{textAlign:"center"}}>PCT</span>
            <span style={{textAlign:"center"}}>GB</span>
          </div>
          {filtered.length===0
            ? <div style={{textAlign:"center",padding:"20px",color:D.textSub,fontSize:"13px"}}>검색 결과 없음</div>
            : filtered.map((row,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"32px 1fr 40px 40px 40px 50px",padding:"10px 12px",borderBottom:i<filtered.length-1?`1px solid ${D.cardBorder}`:"none",alignItems:"center"}}>
                  <span style={{fontSize:"12px",fontWeight:"800",color:i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":D.textSub}}>{i+1}</span>
                  <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                    <span style={{fontSize:"18px"}}>{getTeam(row.name).emoji}</span>
                    <span style={{fontSize:"12px",fontWeight:"700",color:D.text}}>{getTeam(row.name).short}</span>
                  </div>
                  <span style={{textAlign:"center",fontSize:"12px",fontWeight:"700",color:D.text}}>{row.wins}</span>
                  <span style={{textAlign:"center",fontSize:"12px",color:D.textSub}}>{row.losses}</span>
                  <span style={{textAlign:"center",fontSize:"12px",color:D.textSub}}>{row.pct}</span>
                  <span style={{textAlign:"center",fontSize:"12px",color:D.textSub}}>{row.gb}</span>
                </div>
              ))
          }
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("today");
  const [dark, setDark] = useState(false);
  const [time, setTime] = useState(new Date());

  const D = dark ? {
    bg:"#0A0E1A", card:"rgba(255,255,255,0.04)", cardBorder:"rgba(255,255,255,0.07)",
    text:"#fff", textSub:"rgba(255,255,255,0.4)", textMuted:"rgba(255,255,255,0.15)",
    navBg:"#111827", navBorder:"rgba(255,255,255,0.08)", navText:"rgba(255,255,255,0.35)",
    inputBg:"rgba(255,255,255,0.03)",
  } : {
    bg:"#E8ECF1", card:"#ffffff", cardBorder:"rgba(0,0,0,0.1)",
    text:"#0A0E1A", textSub:"rgba(0,0,0,0.5)", textMuted:"rgba(0,0,0,0.2)",
    navBg:"#ffffff", navBorder:"rgba(0,0,0,0.1)", navText:"rgba(0,0,0,0.45)",
    inputBg:"rgba(0,0,0,0.03)",
  };

  useEffect(()=>{ const t=setInterval(()=>setTime(new Date()),1000); return()=>clearInterval(t); },[]);

  useEffect(()=>{
    document.body.style.background = dark ? "#0A0E1A" : "#E8ECF1";
    document.querySelector('meta[name="theme-color"]').setAttribute("content", dark ? "#0A0E1A" : "#E8ECF1");
  },[dark]);

  const TABS = [{id:"today",label:"오늘"},{id:"standings",label:"순위"}];
  const TAB_ORDER = ["today","standings"];
  const touchStart = useRef(null);
  const handleTouchStart = e => { touchStart.current = {x:e.touches[0].clientX,y:e.touches[0].clientY}; };
  const handleTouchEnd = e => {
    if(!touchStart.current) return;
    const dx = touchStart.current.x - e.changedTouches[0].clientX;
    const dy = touchStart.current.y - e.changedTouches[0].clientY;
    touchStart.current = null;
    if(Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<70) return;
    const cur = TAB_ORDER.indexOf(tab);
    if(dx>0&&cur<TAB_ORDER.length-1) setTab(TAB_ORDER[cur+1]);
    if(dx<0&&cur>0) setTab(TAB_ORDER[cur-1]);
  };

  return (
    <div style={{minHeight:"100vh",background:D.bg,color:D.text,transition:"background 0.3s,color 0.3s"}}>
      <div style={{background:dark?"linear-gradient(180deg,#111827 0%,transparent 100%)":"linear-gradient(180deg,#ffffff 0%,transparent 100%)",padding:"18px 16px 12px",transition:"background 0.3s"}}>
        <div style={{maxWidth:"600px",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"24px"}}>⚾</span>
              <div>
                <h1 style={{fontSize:"19px",fontWeight:"900",color:D.text,fontFamily:"'Noto Sans KR',sans-serif"}}>MLB 대시보드</h1>
                <p style={{fontSize:"10px",fontWeight:"700",fontFamily:"'Noto Sans KR',sans-serif"}}>
                  <span style={{color:"#2d3748"}}>실시간 MLB 스코어</span>
                </p>
              </div>
            </div>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}}>
              <div style={{fontSize:"15px",fontWeight:"700",letterSpacing:"0.04em",color:D.text}}>
                {time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <div style={{fontSize:"10px",color:D.textSub,fontFamily:"'Noto Sans KR',sans-serif"}}>
                  {time.toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}
                </div>
                <button onClick={()=>setDark(!dark)} style={{
                  background:dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)",
                  border:"none",borderRadius:"20px",padding:"3px 8px",
                  fontSize:"13px",cursor:"pointer",lineHeight:1,
                }}>
                  {dark?"☀️":"🌙"}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} style={{maxWidth:"600px",margin:"0 auto",padding:"14px 16px 70px"}}>
        {tab==="today"     && <TodayTab     dark={dark} D={D}/>}
        {tab==="standings" && <StandingsTab dark={dark} D={D}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:D.navBg,borderTop:`1px solid ${D.navBorder}`,display:"flex",paddingBottom:"6px",zIndex:50,transition:"background 0.3s"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"4px 0",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",color:tab===t.id?"#2d3748":D.navText,transition:"all 0.2s"}}>
            <span style={{fontSize:"18px"}}>{t.id==="today"?"📅":"🏆"}</span>
            <span style={{fontSize:"9px",fontWeight:tab===t.id?"700":"400",fontFamily:"'Noto Sans KR',sans-serif"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
