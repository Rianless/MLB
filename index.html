<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MLB ⚾"/>
  <meta name="theme-color" content="#0A0E1A"/>
  <title>MLB 대시보드 ⚾</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A0E1A;color:#fff;font-family:"Inter",sans-serif;-webkit-tap-highlight-color:transparent}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes slideDown{from{transform:translateY(0);opacity:1}to{transform:translateY(100%);opacity:0}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    button{cursor:pointer;-webkit-appearance:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const TEAMS = {
  "Arizona Diamondbacks": {short:"ARI", emoji:"🐍", color:"#A71930"},
  "Atlanta Braves":        {short:"ATL", emoji:"🪓", color:"#CE1141"},
  "Baltimore Orioles":     {short:"BAL", emoji:"🐦", color:"#DF4601"},
  "Boston Red Sox":        {short:"BOS", emoji:"🔴", color:"#BD3039"},
  "Chicago Cubs":          {short:"CHC", emoji:"🐻", color:"#0E3386"},
  "Chicago White Sox":     {short:"CWS", emoji:"⚫", color:"#27251F"},
  "Cincinnati Reds":       {short:"CIN", emoji:"🔴", color:"#C6011F"},
  "Cleveland Guardians":   {short:"CLE", emoji:"🔵", color:"#E31937"},
  "Colorado Rockies":      {short:"COL", emoji:"💜", color:"#333366"},
  "Detroit Tigers":        {short:"DET", emoji:"🐯", color:"#0C2340"},
  "Houston Astros":        {short:"HOU", emoji:"⭐", color:"#002D62"},
  "Kansas City Royals":    {short:"KC",  emoji:"💙", color:"#004687"},
  "Los Angeles Angels":    {short:"LAA", emoji:"👼", color:"#BA0021"},
  "Los Angeles Dodgers":   {short:"LAD", emoji:"💙", color:"#005A9C"},
  "Miami Marlins":         {short:"MIA", emoji:"🐟", color:"#00A3E0"},
  "Milwaukee Brewers":     {short:"MIL", emoji:"🍺", color:"#FFC52F"},
  "Minnesota Twins":       {short:"MIN", emoji:"🔴", color:"#002B5C"},
  "New York Mets":         {short:"NYM", emoji:"🔵", color:"#002D72"},
  "New York Yankees":      {short:"NYY", emoji:"⚾", color:"#003087"},
  "Oakland Athletics":     {short:"OAK", emoji:"🐘", color:"#003831"},
  "Philadelphia Phillies": {short:"PHI", emoji:"🔔", color:"#E81828"},
  "Pittsburgh Pirates":    {short:"PIT", emoji:"☠️", color:"#FDB827"},
  "San Diego Padres":      {short:"SD",  emoji:"🤎", color:"#2F241D"},
  "San Francisco Giants":  {short:"SF",  emoji:"🟠", color:"#FD5A1E"},
  "Seattle Mariners":      {short:"SEA", emoji:"🧭", color:"#0C2C56"},
  "St. Louis Cardinals":   {short:"STL", emoji:"🐦", color:"#C41E3A"},
  "Tampa Bay Rays":        {short:"TB",  emoji:"💛", color:"#092C5C"},
  "Texas Rangers":         {short:"TEX", emoji:"🤠", color:"#003278"},
  "Toronto Blue Jays":     {short:"TOR", emoji:"🐦", color:"#134A8E"},
  "Washington Nationals":  {short:"WSH", emoji:"🦅", color:"#AB0003"},
};

function getTeam(name) {
  return TEAMS[name] || {short: name?.split(" ").pop() || "?", emoji:"⚾", color:"#888"};
}

function ScoreCard({game, dark, D, onClick}) {
  const away = getTeam(game.away.name);
  const home = getTeam(game.home.name);
  const isLive = game.status === "In Progress";
  const isFinal = game.status === "Final" || game.status === "Game Over";
  const isScheduled = !isLive && !isFinal;

  const gameTime = new Date(game.startTime).toLocaleTimeString("ko-KR", {
    hour:"2-digit", minute:"2-digit", timeZone:"Asia/Seoul"
  });

  return (
    <div onClick={onClick} style={{
      background:D.card, border:`1px solid ${D.cardBorder}`,
      borderRadius:"16px", padding:"14px 16px", marginBottom:"10px",
      animation:"fadeIn 0.3s", cursor:"pointer",
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          {isLive && <span style={{
            fontSize:"10px",fontWeight:"800",color:"#fff",
            background:"#E31837",borderRadius:"4px",padding:"2px 7px",
          }}>● LIVE</span>}
          {isFinal && <span style={{fontSize:"10px",fontWeight:"700",color:D.textSub,fontFamily:"Noto Sans KR"}}>FINAL</span>}
          {isScheduled && <span style={{fontSize:"11px",fontWeight:"700",color:"#FFB300"}}>{gameTime} KST</span>}
          {isLive && <span style={{fontSize:"11px",color:"#FFB300",fontWeight:"700"}}>
            {game.inningHalf==="Top"?"▲":"▼"}{game.inning}회
          </span>}
        </div>
        <span style={{fontSize:"10px",color:D.textSub,fontFamily:"Noto Sans KR"}}>{game.venue}</span>
      </div>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1}}>
          <span style={{fontSize:"28px"}}>{away.emoji}</span>
          <div>
            <div style={{fontSize:"14px",fontWeight:"800",color:D.text}}>{away.short}</div>
            <div style={{fontSize:"9px",color:D.textSub,fontFamily:"Noto Sans KR"}}>{game.away.record}</div>
          </div>
        </div>

        <div style={{textAlign:"center",padding:"0 12px"}}>
          {isScheduled
            ? <span style={{fontSize:"18px",fontWeight:"900",color:D.textSub}}>VS</span>
            : <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"30px",fontWeight:"900",color:D.text,
                  opacity:isFinal&&game.away.score>game.home.score?1:0.6}}>{game.away.score}</span>
                <span style={{fontSize:"14px",color:D.textSub}}>:</span>
                <span style={{fontSize:"30px",fontWeight:"900",color:D.text,
                  opacity:isFinal&&game.home.score>game.away.score?1:0.6}}>{game.home.score}</span>
              </div>
          }
        </div>

        <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1,flexDirection:"row-reverse"}}>
          <span style={{fontSize:"28px"}}>{home.emoji}</span>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"14px",fontWeight:"800",color:D.text}}>{home.short}</div>
            <div style={{fontSize:"9px",color:D.textSub,fontFamily:"Noto Sans KR"}}>{game.home.record}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function GameModal({game, dark, D, onClose}) {
  const [closing, setClosing] = useState(false);
  const away = getTeam(game.away.name);
  const home = getTeam(game.home.name);
  const isLive = game.status === "In Progress";
  const isFinal = game.status === "Final" || game.status === "Game Over";
  const isScheduled = !isLive && !isFinal;
  const gameTime = new Date(game.startTime).toLocaleTimeString("ko-KR", {
    hour:"2-digit", minute:"2-digit", timeZone:"Asia/Seoul"
  });
  const gameDate = new Date(game.startTime).toLocaleDateString("ko-KR", {
    month:"long", day:"numeric", weekday:"short", timeZone:"Asia/Seoul"
  });

  const handleClose = () => { setClosing(true); setTimeout(onClose, 280); };

  const innings = Array(9).fill(null);
  const as = game.awayInnings || innings;
  const hs = game.homeInnings || innings;
  const at = (game.awayInnings||[]).reduce((a,b)=>a+(b??0),0);
  const ht = (game.homeInnings||[]).reduce((a,b)=>a+(b??0),0);

  return (
    <div style={{position:"fixed",inset:0,zIndex:100,
      background:dark?"rgba(0,0,0,0.8)":"rgba(0,0,0,0.4)",
      backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",
      justifyContent:"center",animation:"fadeIn 0.2s"}} onClick={handleClose}>
      <div style={{width:"100%",maxWidth:"520px",
        background:dark?"#0F1525":"#ffffff",
        border:`1px solid ${dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)"}`,
        borderRadius:"22px 22px 0 0",maxHeight:"92vh",overflowY:"auto",
        animation:closing?"slideDown 0.28s ease forwards":"slideUp 0.3s ease",
        paddingBottom:"28px"}} onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 2px"}}>
          <div style={{width:"34px",height:"4px",borderRadius:"2px",
            background:dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.15)"}}/>
        </div>

        {/* 헤더 */}
        <div style={{padding:"10px 18px 14px",borderBottom:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.08)"}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div>
              <span style={{fontSize:"11px",fontWeight:"700",color:"#FFB300",fontFamily:"Noto Sans KR"}}>
                {gameDate} · {gameTime} KST
              </span>
              <div style={{fontSize:"10px",color:D.textSub,fontFamily:"Noto Sans KR",marginTop:"2px"}}>📍 {game.venue}</div>
            </div>
            <button onClick={handleClose} style={{
              background:dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.06)",
              border:"none",color:dark?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.5)",
              borderRadius:"50%",width:"28px",height:"28px",fontSize:"16px",
              display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>

          {/* 팀 vs */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1}}>
              <span style={{fontSize:"40px"}}>{away.emoji}</span>
              <div>
                <div style={{fontSize:"16px",fontWeight:"900",color:D.text}}>{away.short}</div>
                <div style={{fontSize:"11px",color:D.textSub,fontFamily:"Noto Sans KR"}}>{game.away.name}</div>
                <div style={{fontSize:"10px",color:D.textSub}}>{game.away.record}</div>
              </div>
            </div>
            <div style={{textAlign:"center",padding:"0 10px"}}>
              {isScheduled
                ? <div style={{fontSize:"20px",fontWeight:"800",color:"#FFB300"}}>VS</div>
                : <div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <span style={{fontSize:"32px",fontWeight:"900",color:D.text}}>{game.away.score}</span>
                      <span style={{color:D.textSub}}>:</span>
                      <span style={{fontSize:"32px",fontWeight:"900",color:D.text}}>{game.home.score}</span>
                    </div>
                    {isLive && <div style={{fontSize:"11px",color:"#FFB300",fontWeight:"700",textAlign:"center"}}>
                      {game.inningHalf==="Top"?"▲":"▼"}{game.inning}회
                    </div>}
                    {isFinal && <div style={{fontSize:"10px",color:D.textSub,fontFamily:"Noto Sans KR",textAlign:"center"}}>FINAL</div>}
                  </div>
              }
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1,flexDirection:"row-reverse"}}>
              <span style={{fontSize:"40px"}}>{home.emoji}</span>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:"16px",fontWeight:"900",color:D.text}}>{home.short}</div>
                <div style={{fontSize:"11px",color:D.textSub,fontFamily:"Noto Sans KR"}}>{game.home.name}</div>
                <div style={{fontSize:"10px",color:D.textSub}}>{game.home.record}</div>
              </div>
            </div>
          </div>
        </div>

        {/* 이닝 스코어 */}
        <div style={{padding:"18px 18px 0"}}>
          <div style={{marginBottom:"18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
              <span style={{fontSize:"15px"}}>📊</span>
              <span style={{fontSize:"13px",fontWeight:"800",fontFamily:"Noto Sans KR"}}>이닝별 스코어</span>
            </div>
            <div style={{background:dark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)",
              border:`1px solid ${dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.08)"}`,
              borderRadius:"12px",padding:"4px"}}>
              {isScheduled
                ? <div style={{textAlign:"center",padding:"16px",color:D.textSub,fontSize:"12px",fontFamily:"Noto Sans KR"}}>
                    경기 예정 · 경기 후 스코어가 표시됩니다
                  </div>
                : <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",minWidth:"320px"}}>
                      <thead>
                        <tr>
                          <td style={{padding:"6px",color:D.textSub,width:"55px"}}></td>
                          {[1,2,3,4,5,6,7,8,9].map(i=>(
                            <td key={i} style={{textAlign:"center",padding:"6px 3px",color:D.textSub,fontWeight:"700"}}>{i}</td>
                          ))}
                          <td style={{textAlign:"center",padding:"6px 5px",color:D.text,fontWeight:"900",fontSize:"13px"}}>R</td>
                        </tr>
                      </thead>
                      <tbody>
                        {[[game.away.name,as,at,away.color],[game.home.name,hs,ht,home.color]].map(([nm,sc,tot,cl],ri)=>(
                          <tr key={ri}>
                            <td style={{padding:"8px 6px",fontSize:"11px",fontWeight:"700",color:D.textSub,
                              borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`}}>
                              <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                                <div style={{width:"5px",height:"5px",borderRadius:"50%",background:cl}}/>
                                {getTeam(nm).short}
                              </div>
                            </td>
                            {sc.map((s,i)=>(
                              <td key={i} style={{textAlign:"center",padding:"8px 3px",
                                color:s>0?D.text:D.textMuted,fontWeight:s>0?"700":"400",
                                borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`}}>
                                {s===null?<span style={{color:D.textMuted}}>-</span>:s}
                              </td>
                            ))}
                            <td style={{textAlign:"center",padding:"8px 5px",fontWeight:"900",fontSize:"14px",
                              color:tot===Math.max(at,ht)&&at!==ht?cl:D.text,
                              borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"}`}}>{tot}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
              }
            </div>
          </div>

          {/* 선발 투수 */}
          {(game.away.pitcher || game.home.pitcher) && (
            <div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
                <span style={{fontSize:"15px"}}>⚾</span>
                <span style={{fontSize:"13px",fontWeight:"800",fontFamily:"Noto Sans KR"}}>선발 투수</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {[{t:game.away,info:away},{t:game.home,info:home}].map(({t,info},i)=>(
                  <div key={i} style={{background:dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)",
                    border:`1px solid ${dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.08)"}`,
                    borderRadius:"12px",padding:"12px"}}>
                    <div style={{fontSize:"10px",color:D.textSub,fontFamily:"Noto Sans KR",marginBottom:"4px"}}>
                      {i===0?"원정":"홈"} · {info.short}
                    </div>
                    <div style={{fontSize:"14px",fontWeight:"800",color:D.text}}>
                      {t.pitcher || "미정"}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TodayTab({dark, D}) {
  const [games, setGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [selGame, setSelGame] = useState(null);

  const fetchGames = async () => {
    try {
      const r = await fetch("/api/mlbScores");
      const data = await r.json();
      if(data.error) throw new Error(data.error);
      setGames(data.games || []);
      setLastUpdate(new Date());
      setError(null);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  useEffect(()=>{
    fetchGames();
    const interval = setInterval(fetchGames, 30000);
    return ()=>clearInterval(interval);
  },[]);

  const liveGames      = games.filter(g=>g.status==="In Progress");
  const finalGames     = games.filter(g=>g.status==="Final"||g.status==="Game Over");
  const scheduledGames = games.filter(g=>g.status!=="In Progress"&&g.status!=="Final"&&g.status!=="Game Over");

  return (
    <div style={{animation:"fadeIn 0.4s"}}>
      {selGame && <GameModal game={selGame} dark={dark} D={D} onClose={()=>setSelGame(null)}/>}

      {/* 갱신 상태 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div style={{fontSize:"11px",color:D.textSub,fontFamily:"Noto Sans KR"}}>
          {loading?"불러오는 중...":lastUpdate?`${lastUpdate.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})} 업데이트`:""}
        </div>
        <button onClick={fetchGames} style={{
          background:"#E31837",border:"none",color:"#fff",
          borderRadius:"8px",padding:"5px 12px",fontSize:"11px",
          fontFamily:"Noto Sans KR",fontWeight:"700",cursor:"pointer"}}>🔄 새로고침</button>
      </div>

      {loading && (
        <div style={{textAlign:"center",padding:"60px 0",color:D.textSub}}>
          <div style={{fontSize:"36px",display:"inline-block",animation:"spin 1s linear infinite"}}>⚾</div>
          <div style={{marginTop:"12px",fontFamily:"Noto Sans KR",fontSize:"13px"}}>경기 정보 불러오는 중...</div>
        </div>
      )}

      {error && (
        <div style={{background:"rgba(227,24,55,0.1)",border:"1px solid rgba(227,24,55,0.3)",
          borderRadius:"12px",padding:"16px",textAlign:"center",color:"#E31837",fontFamily:"Noto Sans KR"}}>
          ❌ {error}
          <br/>
          <button onClick={fetchGames} style={{marginTop:"8px",background:"#E31837",color:"#fff",
            border:"none",borderRadius:"6px",padding:"4px 12px",cursor:"pointer",fontFamily:"Noto Sans KR"}}>다시 시도</button>
        </div>
      )}

      {!loading && !error && games.length===0 && (
        <div style={{textAlign:"center",padding:"60px 0",color:D.textSub,fontFamily:"Noto Sans KR"}}>
          오늘 예정된 경기가 없어요 😴
        </div>
      )}

      {liveGames.length>0 && (
        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:"#E31837",letterSpacing:"0.1em",marginBottom:"8px",fontFamily:"Noto Sans KR"}}>
            ● LIVE ({liveGames.length}경기)
          </div>
          {liveGames.map(g=><ScoreCard key={g.id} game={g} dark={dark} D={D} onClick={()=>setSelGame(g)}/>)}
        </div>
      )}

      {scheduledGames.length>0 && (
        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:D.textSub,letterSpacing:"0.1em",marginBottom:"8px",fontFamily:"Noto Sans KR"}}>
            예정 ({scheduledGames.length}경기)
          </div>
          {scheduledGames.map(g=><ScoreCard key={g.id} game={g} dark={dark} D={D} onClick={()=>setSelGame(g)}/>)}
        </div>
      )}

      {finalGames.length>0 && (
        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:D.textSub,letterSpacing:"0.1em",marginBottom:"8px",fontFamily:"Noto Sans KR"}}>
            종료 ({finalGames.length}경기)
          </div>
          {finalGames.map(g=><ScoreCard key={g.id} game={g} dark={dark} D={D} onClick={()=>setSelGame(g)}/>)}
        </div>
      )}
    </div>
  );
}

function StandingsTab({dark, D}) {
  const [standings, setStandings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [league, setLeague] = useState("AL");

  useEffect(()=>{
    fetch("/api/mlbStandings")
      .then(r=>r.json())
      .then(data=>{
        if(data.error) throw new Error(data.error);
        setStandings(data.standings||[]);
      })
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(false));
  },[]);

  const filtered = standings.filter(t=>t.league===league);

  return (
    <div style={{animation:"fadeIn 0.4s"}}>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
        {["AL","NL"].map(l=>(
          <button key={l} onClick={()=>setLeague(l)} style={{
            padding:"6px 20px",background:league===l?"#E31837":"transparent",
            border:`1px solid ${league===l?"#E31837":D.cardBorder}`,
            color:league===l?"#fff":D.text,borderRadius:"20px",
            fontSize:"13px",fontWeight:"700"}}>
            {l}
          </button>
        ))}
      </div>

      {loading && <div style={{textAlign:"center",padding:"40px",color:D.textSub,fontFamily:"Noto Sans KR"}}>로딩 중...</div>}
      {error && <div style={{color:"#E31837",textAlign:"center",padding:"20px",fontFamily:"Noto Sans KR"}}>❌ {error}</div>}

      {!loading && !error && (
        <div style={{background:D.inputBg,border:`1px solid ${D.cardBorder}`,borderRadius:"14px",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 40px 40px 40px 50px",
            padding:"9px 12px",borderBottom:`1px solid ${D.cardBorder}`,
            fontSize:"9px",fontWeight:"700",letterSpacing:"0.1em",color:D.textSub,textTransform:"uppercase"}}>
            <span>#</span><span>팀</span><span style={{textAlign:"center"}}>W</span>
            <span style={{textAlign:"center"}}>L</span><span style={{textAlign:"center"}}>PCT</span>
            <span style={{textAlign:"center"}}>GB</span>
          </div>
          {filtered.map((row,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"32px 1fr 40px 40px 40px 50px",
              padding:"10px 12px",borderBottom:i<filtered.length-1?`1px solid ${D.cardBorder}`:"none",
              alignItems:"center"}}>
              <span style={{fontSize:"12px",fontWeight:"800",color:i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":D.textSub}}>{i+1}</span>
              <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                <span style={{fontSize:"18px"}}>{getTeam(row.name).emoji}</span>
                <span style={{fontSize:"12px",fontWeight:"700",color:D.text,fontFamily:"Noto Sans KR"}}>{getTeam(row.name).short}</span>
              </div>
              <span style={{textAlign:"center",fontSize:"12px",fontWeight:"700",color:D.text}}>{row.wins}</span>
              <span style={{textAlign:"center",fontSize:"12px",color:D.textSub}}>{row.losses}</span>
              <span style={{textAlign:"center",fontSize:"12px",color:D.textSub}}>{row.pct}</span>
              <span style={{textAlign:"center",fontSize:"12px",color:D.textSub}}>{row.gb}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("today");
  const [dark, setDark] = useState(false);
  const [time, setTime] = useState(new Date());

  const D = dark ? {
    bg:"#0A0E1A", card:"rgba(255,255,255,0.04)", cardBorder:"rgba(255,255,255,0.07)",
    text:"#fff", textSub:"rgba(255,255,255,0.4)", textMuted:"rgba(255,255,255,0.15)",
    navBg:"#111827", navBorder:"rgba(255,255,255,0.08)", navText:"rgba(255,255,255,0.35)",
    inputBg:"rgba(255,255,255,0.03)",
  } : {
    bg:"#E8ECF1", card:"#ffffff", cardBorder:"rgba(0,0,0,0.1)",
    text:"#0A0E1A", textSub:"rgba(0,0,0,0.5)", textMuted:"rgba(0,0,0,0.2)",
    navBg:"#ffffff", navBorder:"rgba(0,0,0,0.1)", navText:"rgba(0,0,0,0.45)",
    inputBg:"rgba(0,0,0,0.03)",
  };

  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date()),1000);
    return ()=>clearInterval(t);
  },[]);

  const TABS = [{id:"today",label:"오늘"},{id:"standings",label:"순위"}];
  const TAB_ORDER = ["today","standings"];
  const touchStart = useRef(null);
  const handleTouchStart = e => { touchStart.current = {x:e.touches[0].clientX,y:e.touches[0].clientY}; };
  const handleTouchEnd = e => {
    if(!touchStart.current) return;
    const dx = touchStart.current.x - e.changedTouches[0].clientX;
    const dy = touchStart.current.y - e.changedTouches[0].clientY;
    touchStart.current = null;
    if(Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<70) return;
    const cur = TAB_ORDER.indexOf(tab);
    if(dx>0&&cur<TAB_ORDER.length-1) setTab(TAB_ORDER[cur+1]);
    if(dx<0&&cur>0) setTab(TAB_ORDER[cur-1]);
  };

  return (
    <div style={{minHeight:"100vh",background:D.bg,color:D.text,transition:"background 0.3s,color 0.3s"}}>
      {/* 헤더 */}
      <div style={{background:dark?"linear-gradient(180deg,#111827 0%,transparent 100%)":"linear-gradient(180deg,#fff 0%,transparent 100%)",padding:"18px 16px 12px",transition:"background 0.3s"}}>
        <div style={{maxWidth:"600px",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"26px"}}>⚾</span>
              <div>
                <h1 style={{fontSize:"19px",fontWeight:"900",color:D.text,fontFamily:"Noto Sans KR"}}>MLB 대시보드</h1>
                <p style={{fontSize:"10px",fontWeight:"700",color:D.textSub,fontFamily:"Noto Sans KR"}}>실시간 MLB 스코어</p>
              </div>
            </div>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
              <div style={{fontSize:"15px",fontWeight:"700",color:D.text}}>
                {time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <div style={{fontSize:"10px",color:D.textSub,fontFamily:"Noto Sans KR"}}>
                  {time.toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}
                </div>
                <button onClick={()=>setDark(!dark)} style={{
                  background:dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)",
                  border:"none",borderRadius:"20px",padding:"3px 8px",fontSize:"13px",cursor:"pointer"
                }}>{dark?"☀️":"🌙"}</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* 본문 */}
      <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
        style={{maxWidth:"600px",margin:"0 auto",padding:"14px 16px 70px"}}>
        {tab==="today"    && <TodayTab    dark={dark} D={D}/>}
        {tab==="standings"&& <StandingsTab dark={dark} D={D}/>}
      </div>

      {/* 하단 네비 */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,
        background:D.navBg,borderTop:`1px solid ${D.navBorder}`,
        display:"flex",paddingBottom:"6px",zIndex:50,transition:"background 0.3s"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"4px 0",background:"transparent",border:"none",
            display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",
            color:tab===t.id?"#E31837":D.navText,transition:"all 0.2s"}}>
            <span style={{fontSize:"18px"}}>{t.id==="today"?"📅":"🏆"}</span>
            <span style={{fontSize:"9px",fontWeight:tab===t.id?"700":"400",fontFamily:"Noto Sans KR"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
