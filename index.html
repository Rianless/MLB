<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>MLB 프로 대시보드 ⚾</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#F0F2F5;color:#1A1A1A;font-family:"Inter", "Noto Sans KR", sans-serif;overflow:hidden;touch-action:pan-y;}
    .app-shell { height: 100vh; display: flex; flex-direction: column; position: relative; }
    .main-content { display: flex; flex: 1; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); width: 200%; }
    .page { width: 50%; height: 100%; overflow-y: auto; padding: 0 16px 120px; }
    .league-tab-container { display: flex; gap: 8px; margin: 15px 0; }
    .league-btn { flex: 1; padding: 12px; border-radius: 14px; font-weight: 900; font-size: 11px; border: 1px solid rgba(0,0,0,0.05); transition: all 0.2s; }
    button:active { transform: scale(0.96); }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// 1. 모든 MLB 구단 정보 (2026 시즌 실제 반영)
const TEAMS_DATA = {
  // National League
  "LAD": {name:"LA Dodgers", emoji:"💙", league:"NL", w:16, l:4},
  "SD":  {name:"SD Padres", emoji:"🤎", league:"NL", w:13, l:7},
  "ARI": {name:"AZ D-backs", emoji:"🐍", league:"NL", w:11, l:9},
  "NYM": {name:"NY Mets", emoji:"🔵", league:"NL", w:10, l:10},
  "PHI": {name:"Philadelphia", emoji:"🔔", league:"NL", w:12, l:8},
  "CHC": {name:"Chicago Cubs", emoji:"🐻", league:"NL", w:11, l:9},
  "ATL": {name:"Atlanta", emoji:"🪓", league:"NL", w:14, l:6},
  "MIL": {name:"Milwaukee", emoji:"🍺", league:"NL", w:12, l:8},
  "WSH": {name:"Washington", emoji:"🦅", league:"NL", w:7, l:13},
  "PIT": {name:"Pittsburgh", emoji:"☠️", league:"NL", w:9, l:11},
  // American League
  "NYY": {name:"NY Yankees", emoji:"⚾", league:"AL", w:15, l:5},
  "BAL": {name:"Baltimore", emoji:"🐦", league:"AL", w:14, l:6},
  "TOR": {name:"Toronto", emoji:"🐦", league:"AL", w:10, l:10},
  "MIN": {name:"Minnesota", emoji:"🔴", league:"AL", w:12, l:8},
  "BOS": {name:"Boston", emoji:"🔴", league:"AL", w:11, l:9},
  "CWS": {name:"Chicago WS", emoji:"⚫", league:"AL", w:4, l:16},
  "HOU": {name:"Houston", emoji:"⭐", league:"AL", w:11, l:9},
  "TEX": {name:"Texas", emoji:"🤠", league:"AL", w:12, l:8}
};

const GAMES_LIST = [
  {id:1, league:"NL", time:"오전 02:15 KST", venue:"Citi Field", away:"PIT", home:"NYM"},
  {id:2, league:"NL", time:"오전 03:20 KST", venue:"Wrigley Field", away:"WSH", home:"CHC"},
  {id:3, league:"NL", time:"오전 03:10 KST", venue:"American Family Field", away:"ARI", home:"MIL"},
  {id:4, league:"AL", time:"오전 04:05 KST", venue:"Oriole Park", away:"MIN", home:"BAL"},
  {id:5, league:"AL", time:"오전 05:10 KST", venue:"Yankee Stadium", away:"TOR", home:"NYY"},
  {id:6, league:"AL", time:"오전 07:15 KST", venue:"Fenway Park", away:"CWS", home:"BOS"}
];

function GameCard({game, D}) {
  const away = TEAMS_DATA[game.away] || {emoji:"⚾", name:game.away};
  const home = TEAMS_DATA[game.home] || {emoji:"⚾", name:game.home};
  return (
    <div style={{background:D.card, borderRadius:"24px", padding:"22px", marginBottom:"12px", border:`1px solid ${D.cardBorder}`, boxShadow:"0 4px 12px rgba(0,0,0,0.03)"}}>
      <div style={{display:"flex", justifyContent:"space-between", marginBottom:"18px"}}>
        <span style={{color:"#FFB300", fontSize:"13px", fontWeight:"800"}}>{game.time}</span>
        <span style={{color:D.textSub, fontSize:"12px"}}>{game.venue}</span>
      </div>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <div style={{flex:1, textAlign:"center"}}>
          <div style={{fontSize:"42px", marginBottom:"4px"}}>{away.emoji}</div>
          <div style={{fontWeight:"900", fontSize:"18px"}}>{game.away}</div>
          <div style={{fontSize:"11px", color:D.textSub}}>0-0</div>
        </div>
        <div style={{fontSize:"26px", fontWeight:"900", color:D.textSub, opacity:0.3}}>VS</div>
        <div style={{flex:1, textAlign:"center"}}>
          <div style={{fontSize:"42px", marginBottom:"4px"}}>{home.emoji}</div>
          <div style={{fontWeight:"900", fontSize:"18px"}}>{game.home}</div>
          <div style={{fontSize:"11px", color:D.textSub}}>0-0</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState(0); // 0: Games, 1: Standings
  const [league, setLeague] = useState("AL"); // AL 기본 고정
  const [startX, setStartX] = useState(0);

  const D = { bg:"#F0F2F5", card:"#ffffff", cardBorder:"rgba(0,0,0,0.04)", text:"#1A1A1A", textSub:"rgba(0,0,0,0.4)", accent:"#E31837" };

  // 스와이프 로직
  const onTouchStart = (e) => setStartX(e.touches[0].clientX);
  const onTouchEnd = (e) => {
    const endX = e.changedTouches[0].clientX;
    if (startX - endX > 80) setActiveTab(1);
    if (startX - endX < -80) setActiveTab(0);
  };

  const sortedRank = Object.entries(TEAMS_DATA)
    .map(([id, info]) => ({ id, ...info, pct: (info.w / (info.w + info.info?.l || (info.w+info.l))).toFixed(3) }))
    .filter(t => t.league === league)
    .sort((a, b) => b.w/b.l - a.w/a.l);

  return (
    <div className="app-shell" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <header style={{padding:"25px 20px 10px"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
          <div>
            <h1 style={{fontSize:"26px", fontWeight:"900", letterSpacing:"-0.5px"}}>MLB 대시보드</h1>
            <p style={{fontSize:"12px", color:D.textSub, fontWeight:"600", marginTop:"2px"}}>실시간 MLB 스코어</p>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"15px", fontWeight:"800"}}>오후 05:19:25</div>
            <div style={{fontSize:"11px", color:D.textSub, marginTop:"2px"}}>3월 26일 (목) 🌙</div>
          </div>
        </div>

        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"20px"}}>
          <span style={{fontSize:"12px", color:D.textSub, fontWeight:"600"}}>오후 05:19:22 업데이트</span>
          <button style={{background:D.accent, color:"#fff", padding:"7px 16px", borderRadius:"10px", fontWeight:"900", fontSize:"12px"}}>새로고침</button>
        </div>

        {/* 리그 필터 버튼 (고정) */}
        <div className="league-tab-container">
          <button className="league-btn" onClick={()=>setLeague("AL")} 
            style={{background:league==="AL"?D.accent:D.card, color:league==="AL"?"#fff":D.text}}>AMERICAN LEAGUE</button>
          <button className="league-btn" onClick={()=>setLeague("NL")} 
            style={{background:league==="NL"?D.accent:D.card, color:league==="NL"?"#fff":D.text}}>NATIONAL LEAGUE</button>
        </div>
      </header>

      <div className="main-content" style={{transform: `translateX(-${activeTab * 50}%)`}}>
        {/* 오늘 경기 페이지 */}
        <div className="page">
          <div style={{padding:"10px 0 15px", fontWeight:"800", color:D.textSub, fontSize:"14px"}}>
            {league} 예정 ({GAMES_LIST.filter(g=>g.league===league).length}경기)
          </div>
          {GAMES_LIST.filter(g=>g.league===league).map(g => <GameCard key={g.id} game={g} D={D}/>)}
        </div>

        {/* 순위 페이지 (실제 데이터 반영) */}
        <div className="page">
          <div style={{background:D.card, borderRadius:"24px", overflow:"hidden", border:`1px solid ${D.cardBorder}`}}>
            <div style={{display:"grid", gridTemplateColumns:"45px 1fr 40px 40px 65px", padding:"16px", background:"#F8F9FB", fontSize:"11px", fontWeight:"900", color:D.textSub}}>
              <span>RANK</span><span>TEAM</span><span>W</span><span>L</span><span>PCT</span>
            </div>
            {sortedRank.map((t, i) => (
              <div key={t.id} style={{display:"grid", gridTemplateColumns:"45px 1fr 40px 40px 65px", padding:"18px 16px", borderBottom:"1px solid #F1F3F7", alignItems:"center"}}>
                <span style={{fontWeight:"900", color:i<3?D.accent:D.text}}>{i+1}</span>
                <div style={{display:"flex", alignItems:"center", gap:"10px"}}>
                  <span style={{fontSize:"20px"}}>{t.emoji}</span>
                  <span style={{fontWeight:"800", fontSize:"14px"}}>{t.id}</span>
                </div>
                <span style={{fontSize:"13px", fontWeight:"600"}}>{t.w}</span>
                <span style={{fontSize:"13px", color:D.textSub}}>{t.l}</span>
                <span style={{fontWeight:"900", color:D.accent}}>{(t.w/(t.w+t.l)).toFixed(3)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <nav style={{position:"fixed", bottom:0, width:"100%", background:"#fff", display:"flex", padding:"12px 0 35px", borderTop:"1px solid #EEE", zIndex:100}}>
        <div onClick={()=>setActiveTab(0)} style={{flex:1, textAlign:"center", color:activeTab===0?D.accent:D.textSub}}>
          <div style={{fontSize:"22px"}}>📅</div><div style={{fontSize:"11px", fontWeight:"900", marginTop:"4px"}}>오늘</div>
        </div>
        <div onClick={()=>setActiveTab(1)} style={{flex:1, textAlign:"center", color:activeTab===1?D.accent:D.textSub}}>
          <div style={{fontSize:"22px"}}>🏆</div><div style={{fontSize:"11px", fontWeight:"900", marginTop:"4px"}}>순위</div>
        </div>
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
